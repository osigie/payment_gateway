spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  bank:
    base-url: http://localhost:18787
    read-timeout: 1s
    timeout: 1s

logging:
  level:
    com.osigie: DEBUG
